name: Repo CodeQL config

# Ported from game-shelf, where Fastify routes are actually protected by
# @fastify/rate-limit. server/ here has no rate-limiting yet (no
# @fastify/rate-limit dependency), so js/missing-rate-limiting is a real,
# currently-valid finding, not a false positive. Suppressed anyway as a
# deliberate, accepted tradeoff rather than an oversight — revisit if/when
# real rate-limiting is added to server/src/api.ts.
query-filters:
  - exclude:
      id: js/missing-rate-limiting
