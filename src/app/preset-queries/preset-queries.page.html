<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/gather"></ion-back-button>
    </ion-buttons>
    <ion-title>Preset Queries</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="newPreset()" aria-label="New Preset">
        <ion-icon slot="icon-only" name="add"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  @if (rows.length === 0) {
    <p class="preset-queries-empty">No presets yet — tap "New Preset" to create one.</p>
  }

  @for (row of rows; track row.preset.id) {
    <ion-card>
      <ion-card-header>
        <ion-card-title>{{ row.preset.name }}</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <ion-button expand="block" (click)="copy(row.config.value)">
          <ion-icon slot="start" name="copy-outline"></ion-icon>
          Copy
        </ion-button>
        <ion-textarea [readonly]="true" [autoGrow]="true" [value]="row.config.value"></ion-textarea>
      </ion-card-content>
      <ion-button fill="clear" (click)="editPreset(row.preset)">Edit</ion-button>
      <ion-button fill="clear" color="danger" (click)="deletePreset(row.preset)">Delete</ion-button>
    </ion-card>
  }
</ion-content>
