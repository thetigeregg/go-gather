<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button menu="start">
        <ion-icon name="menu"></ion-icon>
      </ion-menu-button>
    </ion-buttons>
    <ion-title>{{ headerText || 'GO Gather' }}</ion-title>
    <ion-buttons slot="end">
      <ion-menu-button menu="end">
        <ion-icon name="filter"></ion-icon>
      </ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
  <ion-toolbar color="primary">
    <ion-searchbar
      #searchbar
      placeholder="Search Pokémon"
      [value]="searchTerm"
      (ionInput)="onSearchChange($event.detail.value ?? '')"
    ></ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content [scrollY]="false">
  <div class="gather-scroll-region">
    @if (flatRows.length) {
      <div class="sticky-header-bar">
        <div class="generation-line">
          {{ stickyGenerationName }} ({{ stickyGenerationCaught }}/{{ stickyGenerationTotal }})
        </div>
        @if (stickySpeciesName) {
          <div class="species-line">{{ stickySpeciesName }} - #{{ stickySpeciesDexNr }}</div>
        }
      </div>
    }

    <cdk-virtual-scroll-viewport
      [itemSize]="rowItemSizePx"
      class="gather-viewport"
      (scrolledIndexChange)="onScrolledIndexChange($event)"
    >
      <ng-container *cdkVirtualFor="let row of flatRows; trackBy: trackGatherRow">
        @switch (row.kind) {
          @case ('generation-header') {
            <app-generation-header-row [generation]="row.generation"></app-generation-header-row>
          }
          @case ('entry') {
            <app-gather-entry-row [row]="row"></app-gather-entry-row>
          }
        }
      </ng-container>
    </cdk-virtual-scroll-viewport>
  </div>

  <ion-fab slot="fixed" horizontal="end" vertical="bottom">
    <ion-fab-button color="primary" size="small" (click)="focusSearch()">
      <ion-icon name="search"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
