<ion-header>
  <ion-toolbar>
    <ion-title>{{ headerText || 'GO Gather' }}</ion-title>
    <ion-buttons slot="end">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-accordion-group [multiple]="true">
    @for (generation of generationToPokemonMap; track generation.generationName) {
      <app-poke-group [generation]="generation" [userSettings]="userSettings"></app-poke-group>
    }
  </ion-accordion-group>
</ion-content>
