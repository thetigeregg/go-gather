<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button menu="start">
        <ion-icon name="menu"></ion-icon>
      </ion-menu-button>
    </ion-buttons>
    <ion-title>{{ headerText || 'GO Gather' }}</ion-title>
    <ion-buttons slot="end">
      <ion-menu-button menu="end">
        <ion-icon name="filter"></ion-icon>
      </ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
  <ion-toolbar color="primary">
    <ion-searchbar
      placeholder="Search Pokémon"
      [value]="searchTerm"
      (ionInput)="onSearchChange($event.detail.value ?? '')"
    ></ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-accordion-group [multiple]="true" (ionChange)="onAccordionChange($event.detail.value)">
    @for (generation of visibleGenerations; track generation.generationName) {
      <app-poke-group
        [generation]="generation"
        [expanded]="expandedGenerations.has(generation.generationName)"
      ></app-poke-group>
    }
  </ion-accordion-group>
</ion-content>
