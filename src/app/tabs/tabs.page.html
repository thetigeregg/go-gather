<ion-tabs>
  <!-- id referenced as positionAnchor by toasts on pages nested under /tabs, so they sit above the bar instead of behind it -->
  <ion-tab-bar slot="bottom" id="main-tab-bar">
    <ion-tab-button tab="gather" href="/tabs/gather">
      <ion-icon aria-hidden="true" name="apps"></ion-icon>
      <ion-label>Gather</ion-label>
    </ion-tab-button>
    <ion-tab-button tab="calendar" href="/tabs/calendar">
      <ion-icon aria-hidden="true" name="calendar"></ion-icon>
      <ion-label>Calendar</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
