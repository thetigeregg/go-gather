<ion-item button [class.caught]="caught" (click)="entryCardClicked()" lines="full">
  <ion-thumbnail slot="start">
    <img
      [src]="spriteSrc"
      alt="Sprite of {{ entry.name }}"
      loading="lazy"
      (error)="onSpriteError()"
    />
  </ion-thumbnail>

  <ion-label>{{ entry.name }}</ion-label>

  <ion-icon slot="end" [name]="caughtButtonIcon" [color]="caught ? 'primary' : 'medium'"></ion-icon>
</ion-item>
