<ion-item button [class.caught]="caught" (click)="entryCardClicked()">
  <ion-thumbnail slot="start">
    <img
      [src]="spriteSrc"
      alt="Sprite of {{ entry.name }}"
      loading="lazy"
      (error)="onSpriteError()"
    />
  </ion-thumbnail>

  <ion-label>{{ entry.name }}</ion-label>

  <ion-buttons slot="end">
    <ion-button fill="clear" (click)="onCaughtButtonClick($event)">
      <ion-icon slot="icon-only" [name]="caughtButtonIcon"></ion-icon>
    </ion-button>
  </ion-buttons>
</ion-item>
