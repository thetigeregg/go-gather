<ion-accordion [value]="config.name">
  <ion-item slot="header" color="light">
    <ion-label>{{ config.name }}</ion-label>
    <ion-button slot="end" size="small" (click)="copy($event)">
      <ion-icon slot="start" name="copy-outline"></ion-icon>
      Copy
    </ion-button>
  </ion-item>

  <div class="ion-padding" slot="content">
    <ion-textarea [readonly]="true" [autoGrow]="true" [value]="config.value"></ion-textarea>
  </div>
</ion-accordion>
