<ion-card class="gather-poke-card">
  <ion-card-header>
    <ion-card-subtitle>
      {{ speciesGroup.speciesName }} - #{{ speciesGroup.dexNr }}
    </ion-card-subtitle>
  </ion-card-header>

  <ion-list>
    @for (entry of speciesGroup.entries; track entry.id) {
      <app-gather-entry [entry]="entry"></app-gather-entry>
    }
  </ion-list>
</ion-card>
