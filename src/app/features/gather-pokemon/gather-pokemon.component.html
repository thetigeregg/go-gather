<ion-card class="gather-poke-card">
  <ion-card-header>
    <ion-card-title>
      <span class="gather-poke-header">{{ speciesGroup.speciesName }}</span>
      <span class="gather-poke-subheader">- #{{ speciesGroup.dexNr }}</span>
    </ion-card-title>
  </ion-card-header>

  <ion-list>
    @for (entry of speciesGroup.entries; track entry.id) {
      <app-gather-entry [entry]="entry"></app-gather-entry>
    }
  </ion-list>
</ion-card>
