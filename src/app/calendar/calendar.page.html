<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button menu="start">
        <ion-icon name="menu"></ion-icon>
      </ion-menu-button>
    </ion-buttons>
    <ion-title>Events</ion-title>
    <ion-buttons slot="end">
      <ion-menu-button menu="calendar-filter">
        <ion-icon name="filter"></ion-icon>
      </ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
  <ion-toolbar color="primary">
    <ion-segment [value]="selectedView" (ionChange)="onViewChange($event.detail.value)">
      <ion-segment-button value="calendar">
        <ion-label>Calendar</ion-label>
      </ion-segment-button>
      <ion-segment-button value="timeline">
        <ion-label>Timeline</ion-label>
      </ion-segment-button>
    </ion-segment>
  </ion-toolbar>
</ion-header>

<ion-content>
  @if (selectedView === 'calendar') {
    <app-calendar-view />
  } @else {
    <app-timeline-view />
  }
</ion-content>
