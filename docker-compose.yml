services:
  server:
    image: ${SERVER_IMAGE:-ghcr.io/thetigeregg/go-gather-server:main}
    container_name: go-gather-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-3000}:3000"
    volumes:
      - ${NAS_DATA_ROOT:-./nas-data}/server-data:/app/server/data
      - ${NAS_DATA_ROOT:-./nas-data}/server-backups:/app/server/backups
      - ${SECRETS_HOST_DIR:-./nas-secrets}:/run/secrets:ro
    environment:
      TZ: ${TZ:-Europe/Zurich}
      # Data-feed sync intervals (hours) — the server syncs all four feeds
      # once at startup, then re-runs each on its own interval. Uncomment to
      # override the defaults.
      # SYNC_CATALOG_INTERVAL_HOURS: ${SYNC_CATALOG_INTERVAL_HOURS:-24}
      # SYNC_CALENDAR_EVENTS_INTERVAL_HOURS: ${SYNC_CALENDAR_EVENTS_INTERVAL_HOURS:-6}
      # SYNC_SEASON_INTERVAL_HOURS: ${SYNC_SEASON_INTERVAL_HOURS:-6}
      # SYNC_POKEMON_STATS_INTERVAL_HOURS: ${SYNC_POKEMON_STATS_INTERVAL_HOURS:-24}
      # User-data backup (same format/filename scheme as the app's own
      # Export Data button) is written to server-backups/ on every startup.
      # Set this to also trigger a backup after N catch add/remove
      # modifications — 0 (default) disables the extra trigger.
      # BACKUP_AFTER_N_MODIFICATIONS: ${BACKUP_AFTER_N_MODIFICATIONS:-0}
      # Calendar-event push notifications (FCM). Required for any push to
      # send — drop the service-account JSON (Firebase Console -> Project
      # Settings -> Service Accounts -> Generate new private key) at
      # ${SECRETS_HOST_DIR:-./nas-secrets}/firebase_service_account_json.
      FIREBASE_SERVICE_ACCOUNT_JSON_FILE: ${FIREBASE_SERVICE_ACCOUNT_JSON_FILE:-/run/secrets/firebase_service_account_json}
      # How often (minutes) the server checks for due notifications.
      # NOTIFICATION_CHECK_INTERVAL_MINUTES: ${NOTIFICATION_CHECK_INTERVAL_MINUTES:-2}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/search-config').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
